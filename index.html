<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenStudio — Shop</title>
<script src="https://js.stripe.com/v3/"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: #0d1117; min-height: 100vh; }

  nav {
    background: #fff; border-bottom: 1px solid #e5e7eb;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.1rem; color: #0d1117; }
  .nav-logo-icon { width: 28px; height: 28px; border: 2px solid #0d1117; border-radius: 6px; display: grid; place-items: center; font-size: 14px; }
  .nav-right { display: flex; align-items: center; gap: 8px; }
  .nav-btn { display: flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; font-family: 'Inter', sans-serif; transition: background 0.15s; }
  .nav-btn.dark { background: #0d1117; color: #fff; }
  .nav-btn.ghost { background: transparent; color: #374151; }
  .nav-btn.ghost:hover { background: #f3f4f6; }

  .page-header { max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 1rem; display: flex; align-items: center; justify-content: space-between; }
  .page-title { font-size: clamp(1.6rem, 3vw, 2rem); font-weight: 900; letter-spacing: -0.01em; text-transform: uppercase; }
  .cart-btn { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px 18px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; color: #0d1117; position: relative; transition: border-color 0.15s; }
  .cart-btn:hover { border-color: #9ca3af; }
  .cart-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; font-weight: 700; display: none; place-items: center; }
  .cart-badge.visible { display: grid; }
  .divider { border: none; border-top: 1px solid #e5e7eb; margin: 0 2rem; }

  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 900px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .products-grid { grid-template-columns: 1fr; } }

  .product-card { background: #fff; border: 1.5px solid #e9eaec; border-radius: 16px; padding: 2rem 1.5rem 1.5rem; display: flex; flex-direction: column; align-items: center; transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s; }
  .product-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.08); border-color: #c7c9cc; transform: translateY(-2px); }
  .product-card.in-cart { border-color: #0d1117; }
  .dollar-circle { width: 72px; height: 72px; background: #0d1117; border-radius: 50%; display: grid; place-items: center; margin-bottom: 1.2rem; }
  .product-price { font-size: 2.4rem; font-weight: 800; letter-spacing: -0.02em; color: #0d1117; margin-bottom: 4px; line-height: 1; }
  .product-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #9ca3af; margin-bottom: 1.4rem; }
  .add-btn { width: 100%; background: #0d1117; color: #fff; border: none; border-radius: 10px; padding: 13px 0; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
  .add-btn:hover { background: #1f2937; }
  .add-btn.added { background: #16a34a; }

  .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; }
  .cart-overlay.open { display: block; }
  .cart-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 380px; background: #fff; z-index: 201; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; box-shadow: -4px 0 32px rgba(0,0,0,0.12); }
  .cart-panel.open { transform: translateX(0); }
  @media (max-width: 420px) { .cart-panel { width: 100%; } }
  .cart-header { padding: 1.5rem; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; justify-content: space-between; }
  .cart-header h2 { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; }
  .close-btn { background: #f3f4f6; border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: grid; place-items: center; }
  .close-btn:hover { background: #e5e7eb; }
  .cart-body { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
  .cart-empty { text-align: center; padding: 3rem 1rem; color: #9ca3af; font-size: 14px; }
  .cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f3f4f6; }
  .cart-item-icon { width: 44px; height: 44px; background: #0d1117; border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 700; font-size: 15px; }
  .cart-item-sub { font-size: 12px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; }
  .cart-qty { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .qty-btn { width: 24px; height: 24px; background: #f3f4f6; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; display: grid; place-items: center; font-weight: 700; }
  .qty-btn:hover { background: #e5e7eb; }
  .qty-num { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
  .cart-item-remove { background: none; border: none; color: #d1d5db; cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 6px; }
  .cart-item-remove:hover { color: #ef4444; background: #fef2f2; }
  .cart-footer { padding: 1.5rem; border-top: 1px solid #f3f4f6; }
  .cart-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .cart-total span { font-size: 14px; color: #6b7280; }
  .cart-total strong { font-size: 1.3rem; font-weight: 800; }
  .checkout-btn { width: 100%; background: #0d1117; color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; transition: background 0.15s; }
  .checkout-btn:hover { background: #1f2937; }
  .checkout-btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 2rem; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .modal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .modal-title { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; }
  .modal-close { background: #f3f4f6; border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: grid; place-items: center; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280; margin-bottom: 5px; }
  .form-group input, .form-group select { width: 100%; background: #f9fafb; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 10px 13px; font-family: 'Inter', sans-serif; font-size: 14px; color: #0d1117; outline: none; transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus { border-color: #0d1117; background: #fff; }
  .form-group input::placeholder { color: #d1d5db; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin: 1.2rem 0 0.8rem; display: flex; align-items: center; gap: 8px; }
  .section-label::before, .section-label::after { content: ''; flex: 1; height: 1px; background: #f3f4f6; }

  #card-element { background: #f9fafb; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 12px 13px; transition: border-color 0.15s; }
  #card-element.StripeElement--focus { border-color: #0d1117; background: #fff; }
  #card-errors { color: #ef4444; font-size: 13px; margin-top: 6px; }

  .modal-total { background: #f9fafb; border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin: 1.2rem 0; }
  .modal-total span { font-size: 13px; color: #6b7280; font-weight: 500; }
  .modal-total strong { font-size: 1.3rem; font-weight: 800; }
  .pay-btn { width: 100%; background: #0d1117; color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .pay-btn:hover { background: #1f2937; }
  .pay-btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
  .secure-note { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 12px; color: #9ca3af; margin-top: 10px; }

  .success-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 400; align-items: center; justify-content: center; padding: 1rem; }
  .success-overlay.open { display: flex; }
  .success-modal { background: #fff; border-radius: 16px; width: 100%; max-width: 420px; padding: 2.5rem; text-align: center; animation: slideUp 0.25s ease; }
  .success-check { width: 72px; height: 72px; background: #dcfce7; border-radius: 50%; display: grid; place-items: center; margin: 0 auto 1.5rem; font-size: 2rem; }
  .success-modal h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase; }
  .success-modal p { color: #6b7280; font-size: 14px; margin-bottom: 0.5rem; }
  .success-modal .amount { font-size: 2.5rem; font-weight: 900; color: #0d1117; margin: 1rem 0 0.5rem; }
  .success-ref { font-size: 12px; color: #9ca3af; margin-bottom: 1.5rem; }
  .success-close { background: #0d1117; color: #fff; border: none; border-radius: 10px; padding: 12px 32px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon">✉</div>
    ZenStudio
  </div>
  <div class="nav-right">
    <button class="nav-btn dark">Shop</button>
    <button class="nav-btn ghost">My Links</button>
    <button class="nav-btn ghost">Admin</button>
  </div>
</nav>

<div style="max-width:1200px; margin:0 auto;">
  <div class="page-header">
    <h1 class="page-title">Purchase Below</h1>
    <button class="cart-btn" onclick="openCart()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
      Cart
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
  <hr class="divider">
</div>

<main>
  <div class="products-grid" id="productsGrid"></div>
</main>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-body" id="cartBody">
    <div class="cart-empty" id="cartEmpty">No items yet. Add a payment option to get started.</div>
    <div id="cartItemsList"></div>
  </div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total</span><strong id="cartTotal">$0</strong></div>
    <button class="checkout-btn" id="checkoutBtn" onclick="openCheckout()" disabled>Proceed to Checkout</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-top">
      <p class="modal-title">Checkout</p>
      <button class="modal-close" onclick="closeCheckout()">✕</button>
    </div>

    <div class="form-group">
      <label>Full name</label>
      <input type="text" id="fullName" placeholder="Jane Doe">
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="jane@example.com">
    </div>

    <div class="section-label">Card information</div>
    <div class="form-group">
      <label>Card details</label>
      <div id="card-element"></div>
      <div id="card-errors"></div>
    </div>

    <div class="section-label">Billing address</div>
    <div class="form-group">
      <label>Country</label>
      <select id="country">
        <option>United States</option>
        <option>United Kingdom</option>
        <option>Canada</option>
        <option>Australia</option>
        <option>Germany</option>
        <option>France</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>City</label>
        <input type="text" id="city" placeholder="New York">
      </div>
      <div class="form-group">
        <label>ZIP / Postcode</label>
        <input type="text" id="zip" placeholder="10001">
      </div>
    </div>

    <div class="modal-total">
      <span>Total due today</span>
      <strong id="modalTotal">$0</strong>
    </div>

    <button class="pay-btn" id="payBtn" onclick="processPayment()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Pay Now
    </button>
    <p class="secure-note">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Secured by Stripe — 256-bit SSL
    </p>
  </div>
</div>

<!-- SUCCESS -->
<div class="success-overlay" id="successOverlay">
  <div class="success-modal">
    <div class="success-check">✓</div>
    <h2>Payment Successful!</h2>
    <p>Your payment of</p>
    <p class="amount" id="successAmt"></p>
    <p>has been received.</p>
    <p class="success-ref" id="successRef"></p>
    <button class="success-close" onclick="resetAll()">Done</button>
  </div>
</div>

<script>
  const AMOUNTS = [1, 5, 10, 50, 100, 200, 500, 1000];
  let cart = {};
  let stripe, cardElement;

  // Init Stripe with your publishable key
  stripe = Stripe('pk_live_51T2gkcPaFIhI2tKrUBXlfTdYAnMmoSvA1glrRRAuM9eWqJx2miERDMbW6tMOgyNBdUcIrl9zDhzSietEpVKWFSV600QgtZYkZc');
  const elements = stripe.elements();
  cardElement = elements.create('card', {
    style: {
      base: { fontFamily: 'Inter, sans-serif', fontSize: '15px', color: '#0d1117', '::placeholder': { color: '#d1d5db' } },
      invalid: { color: '#ef4444' }
    }
  });

  function mountCard() {
    cardElement.mount('#card-element');
    cardElement.on('change', ({ error }) => {
      document.getElementById('card-errors').textContent = error ? error.message : '';
    });
  }

  function renderGrid() {
    document.getElementById('productsGrid').innerHTML = AMOUNTS.map(amt => `
      <div class="product-card" id="card-${amt}">
        <div class="dollar-circle">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
          </svg>
        </div>
        <p class="product-price">$${amt.toLocaleString()}</p>
        <p class="product-label">Payment Option</p>
        <button class="add-btn" id="btn-${amt}" onclick="toggleCart(${amt})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add to Cart
        </button>
      </div>
    `).join('');
  }

  function toggleCart(amt) {
    cart[amt] ? delete cart[amt] : (cart[amt] = { amount: amt, qty: 1 });
    updateUI();
  }
  function changeQty(amt, delta) {
    if (!cart[amt]) return;
    cart[amt].qty += delta;
    if (cart[amt].qty <= 0) delete cart[amt];
    updateUI();
  }
  function removeItem(amt) { delete cart[amt]; updateUI(); }
  function getTotal() { return Object.values(cart).reduce((s, i) => s + i.amount * i.qty, 0); }
  function getCount() { return Object.values(cart).reduce((s, i) => s + i.qty, 0); }

  function updateUI() {
    const items = Object.values(cart);
    const total = getTotal();
    const count = getCount();

    AMOUNTS.forEach(amt => {
      const card = document.getElementById('card-' + amt);
      const btn = document.getElementById('btn-' + amt);
      if (!card || !btn) return;
      if (cart[amt]) {
        card.classList.add('in-cart');
        btn.classList.add('added');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> Added`;
      } else {
        card.classList.remove('in-cart');
        btn.classList.remove('added');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add to Cart`;
      }
    });

    const badge = document.getElementById('cartBadge');
    count > 0 ? (badge.textContent = count, badge.classList.add('visible')) : badge.classList.remove('visible');

    document.getElementById('cartTotal').textContent = '$' + total.toLocaleString();
    document.getElementById('modalTotal').textContent = '$' + total.toLocaleString();
    document.getElementById('checkoutBtn').disabled = items.length === 0;

    const listEl = document.getElementById('cartItemsList');
    const emptyEl = document.getElementById('cartEmpty');
    if (items.length === 0) {
      emptyEl.style.display = 'block'; listEl.innerHTML = '';
    } else {
      emptyEl.style.display = 'none';
      listEl.innerHTML = items.sort((a,b) => a.amount - b.amount).map(i => `
        <div class="cart-item">
          <div class="cart-item-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          </div>
          <div class="cart-item-info">
            <p class="cart-item-name">$${i.amount.toLocaleString()}</p>
            <p class="cart-item-sub">Payment Option</p>
            <div class="cart-qty">
              <button class="qty-btn" onclick="changeQty(${i.amount}, -1)">−</button>
              <span class="qty-num">${i.qty}</span>
              <button class="qty-btn" onclick="changeQty(${i.amount}, 1)">+</button>
            </div>
          </div>
          <button class="cart-item-remove" onclick="removeItem(${i.amount})">✕</button>
        </div>
      `).join('');
    }
  }

  function openCart() { document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartPanel').classList.add('open'); }
  function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartPanel').classList.remove('open'); }
  function openCheckout() { closeCart(); document.getElementById('modalOverlay').classList.add('open'); setTimeout(mountCard, 100); }
  function closeCheckout() { document.getElementById('modalOverlay').classList.remove('open'); }

  async function processPayment() {
    const name = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    if (!name || !email) { alert('Please enter your name and email.'); return; }

    const btn = document.getElementById('payBtn');
    btn.textContent = 'Processing…';
    btn.disabled = true;

    try {
      const res = await fetch('/.netlify/functions/create-payment-intent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: getTotal() }),
      });
      const { clientSecret, error: fnError } = await res.json();
      if (fnError) throw new Error(fnError);

      const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
        payment_method: {
          card: cardElement,
          billing_details: { name, email },
        },
      });

      if (error) {
        document.getElementById('card-errors').textContent = error.message;
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg> Pay Now';
        btn.disabled = false;
      } else {
        closeCheckout();
        document.getElementById('successAmt').textContent = '$' + getTotal().toLocaleString();
        document.getElementById('successRef').textContent = 'Reference: ' + paymentIntent.id;
        document.getElementById('successOverlay').classList.add('open');
      }
    } catch (err) {
      alert('Something went wrong. Please try again.');
      btn.innerHTML = 'Pay Now';
      btn.disabled = false;
    }
  }

  function resetAll() {
    cart = {}; updateUI();
